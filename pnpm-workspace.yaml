packages:
  - example/*
  - lib

autoInstallPeers: true

catalogs:
  biome:
    '@biomejs/biome': ^2.4.4
  concurrently:
    concurrently: ^9.2.1
  google-cloud:
    '@google-cloud/pubsub': ^5.3.0
  nestjs:
    '@nestjs/cli': ^11.0.16
    '@nestjs/common': ^11.1.14
    '@nestjs/config': ^4.0.3
    '@nestjs/core': ^11.1.14
    '@nestjs/microservices': ^11.1.14
    '@nestjs/platform-express': ^11.1.14
    '@nestjs/schematics': ^11.0.9
    '@nestjs/testing': ^11.1.14
    reflect-metadata: ^0.2.2
    rxjs: ^7.8.2
  rimraf:
    rimraf: ^6.1.3
  swc:
    '@swc/cli': ^0.7.10
    '@swc/core': ^1.15.11
    unplugin-swc: ^1.5.9
  typescript:
    '@types/node': ^24.10.13
    source-map-support: ^0.5.21
    ts-loader: ^9.5.4
    ts-node: ^10.9.2
    typescript: ^5.9.3
  vitest:
    '@vitest/coverage-v8': ^4.0.18
    vitest: ^4.0.18

onlyBuiltDependencies:
